<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jul.ia</title>
<meta http-equiv="refresh" content="0;url=login-julia.html">
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(155deg,#0a1147 0%,#0f2070 50%,#1a0f3d 100%);font-family:system-ui,-apple-system,sans-serif;}
  .box{text-align:center;}
  .logo{font-size:34px;font-weight:800;color:#fff;letter-spacing:-1px;}
  .logo span{color:#e84393;}
  .sub{margin-top:10px;font-size:13px;color:rgba(255,255,255,.55);}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#aa00ff;margin:0 3px;animation:p 1s infinite alternate;}
  .dot:nth-child(2){animation-delay:.2s;background:#c95cff;}
  .dot:nth-child(3){animation-delay:.4s;background:#e84393;}
  @keyframes p{from{opacity:.25;transform:translateY(0)}to{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">Jul<span>.</span>ia</div>
    <div class="sub">Entrando na plataforma</div>
    <div style="margin-top:14px;"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>
  <script>location.replace('login-julia.html');</script>
</body>
</html>
