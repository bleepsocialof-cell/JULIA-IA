<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0a1147; --ink:#eef0ff; --mut:#8b8fb5;
  --a1:#e84393; --a2:#a855f7; --focoRGBA:rgba(168,85,247,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--ink);min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(155deg,#0a1147 0%,#0f2070 55%,#1a0f3d 100%);}
.bg svg{position:absolute;inset:0;width:100%;height:100%;}
.wire{fill:none;stroke:rgba(255,255,255,.06);stroke-width:2;}
.flow{fill:none;stroke-width:2.5;stroke-dasharray:26 300;animation:fl 6s linear infinite;opacity:.85;}
@keyframes fl{to{stroke-dashoffset:-326;}}
@media (prefers-reduced-motion:reduce){.flow{animation:none;}}
.wrap{position:relative;z-index:2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.stage{width:100%;max-width:440px;}
.brand{text-align:center;margin-bottom:26px;}
.brand .logo{font-family:'Sora';font-size:40px;font-weight:800;letter-spacing:-1.5px;}
.brand .logo span{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand .tag{margin-top:6px;font-size:13px;color:var(--mut);}
.card{background:rgba(13,18,58,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.08);
  border-radius:20px;padding:30px 28px;box-shadow:0 30px 80px rgba(0,0,0,.45);}
.card h1{font-family:'Sora';font-size:22px;font-weight:700;letter-spacing:-.4px;}
.card .sub{color:var(--mut);font-size:13.5px;margin-top:5px;}
.tagline{color:#c8cbe8;font-size:13px;line-height:1.5;margin-top:12px;padding:11px 13px;border-radius:12px;
  background:rgba(168,85,247,.09);border:1px solid rgba(168,85,247,.22);}
.tagline b{color:#e9b8ff;font-weight:600;}
.field{margin-top:18px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--mut);text-transform:uppercase;margin-bottom:7px;}
.inwrap{position:relative;}
.inwrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mut);}
.field input{width:100%;height:48px;border-radius:13px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045);
  color:var(--ink);padding:0 16px 0 42px;font-size:15px;font-family:'Inter';outline:none;transition:.18s;}
.field input:focus{border-color:var(--a2);box-shadow:0 0 0 4px var(--focoRGBA);}
.field input::placeholder{color:#5a5e85;}
.row{display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:13px;color:var(--mut);}
.row a{color:var(--a1);text-decoration:none;font-weight:600;}
.btn{width:100%;height:50px;margin-top:20px;border:none;border-radius:13px;cursor:pointer;font-family:'Sora';font-weight:700;
  font-size:15.5px;color:#fff;background:linear-gradient(90deg,var(--a1),var(--a2));transition:.18s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 30px var(--focoRGBA);}
.btn:focus-visible,.field input:focus-visible,a:focus-visible{outline:2px solid var(--a2);outline-offset:2px;}
.err{display:none;margin-top:12px;font-size:13px;color:#ff7d9d;background:rgba(232,67,147,.1);
  border:1px solid rgba(232,67,147,.3);border-radius:10px;padding:9px 12px;}
.foot{margin-top:18px;text-align:center;font-size:12.5px;color:var(--mut);}
.foot a{color:var(--a1);font-weight:600;text-decoration:none;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(80px);z-index:50;background:#141a45;
  border:1px solid rgba(255,255,255,.2);color:var(--ink);padding:12px 18px;border-radius:12px;font-size:13.5px;
  box-shadow:0 18px 50px rgba(0,0,0,.5);transition:.28s;opacity:0;}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}
@media (max-width:480px){.card{padding:24px 18px;}.brand .logo{font-size:34px;}}
</style>
</head>
<body>
<div class="bg">
  <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <path class="wire" d="M0,470 H300 V330 H470"/><path class="wire" d="M470,560 V760 H120 V860"/>
    <path class="wire" d="M700,150 V320 H1000 V150"/><path class="wire" d="M1000,330 H1350 V520"/>
    <path class="wire" d="M1350,640 V820 H1150"/><path class="wire" d="M560,690 H780 V900"/>
    <path class="wire" d="M250,90 H650 V250"/><path class="wire" d="M1100,80 V200 H1450"/>
    <path class="wire" d="M80,650 H360 V880"/><path class="wire" d="M900,560 V720 H1200 V900"/>
    <path class="flow" stroke="#e84393" d="M0,470 H300 V330 H470"/>
    <path class="flow" stroke="#a855f7" d="M700,150 V320 H1000 V150" style="animation-delay:1.4s"/>
    <path class="flow" stroke="#e84393" d="M1000,330 H1350 V520" style="animation-delay:2.6s"/>
    <path class="flow" stroke="#a855f7" d="M900,560 V720 H1200 V900" style="animation-delay:3.6s"/>
  </svg>
</div>
<div class="wrap">
  <div class="stage">
    <div class="brand">
      <div class="logo">Jul<span>.ia</span></div>
      <div class="tag">Agente de vendas com IA no WhatsApp</div>
    </div>
    <div class="card">
      <h1>Entrar no Julia</h1>
      <div class="sub">Acesso restrito a clientes Julia.</div>
      <div class="tagline">A <b>inteligência</b> que transforma conversa em venda.</div>
      <div class="field"><label for="email">E-mail</label>
        <div class="inwrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="username"/>
        </div>
      </div>
      <div class="field"><label for="senha">Senha</label>
        <div class="inwrap">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="senha" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
      </div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;"><input type="checkbox" id="lembrar" checked style="width:auto;accent-color:#a855f7;"> Lembrar de mim</label>
        <a href="#" onclick="toast('Fale com o suporte para redefinir sua senha.');return false;">Esqueceu a senha?</a>
      </div>
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div class="err" id="err">E-mail ou senha incorretos.</div>
      <div class="foot">Ainda não tem o Julia? <a href="#" onclick="toast('Fale com a equipe Jul.ia para contratar o Julia.');return false;">Fale com a Jul.ia</a></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ═══ CONTAS DEMO do Julia — depois vem do Supabase Auth ═══ */
const USERS=[
  {email:'admin@julia.com', senha:'123456', nome:'Jadson'},
  {email:'cliente@julia.com', senha:'123456', nome:'Cliente'},
];
const SKEY='sessao_julia';
const DESTINO='julia-v2.html';

function doLogin(){
  const e=document.getElementById('email').value.trim().toLowerCase();
  const p=document.getElementById('senha').value;
  const u=USERS.find(u=>u.email===e&&u.senha===p);
  const err=document.getElementById('err');
  if(!u){err.style.display='block';return;}
  err.style.display='none';
  /* grava a sessão que o painel do produto reconhece → entra direto, sem login antigo */
  try{localStorage.setItem(SKEY,JSON.stringify({email:u.email,em:Date.now()}));}catch(_){}
  location.href=DESTINO;
}
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');
  clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('on'),3200);
}
/* sessão viva? pula o login */
(function(){
  try{
    const s=JSON.parse(localStorage.getItem(SKEY)||'null');
    if(s&&s.em&&(Date.now()-s.em)<7*24*60*60*1000){location.replace(DESTINO);}
  }catch(_){}
})();
</script>
</body>
</html>
